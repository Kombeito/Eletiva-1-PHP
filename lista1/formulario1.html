<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formulário 1</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 100%; max-width: 800px;">
  
  <h3 class="mb-4 text-center">Formulário 1</h3>

  <form method="post">
    
    <div class="row mb-3">
      
      <div class="col-md-4">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" name="nome" class="form-control" placeholder="Alec Lindo" required>
      </div>

      <div class="col-md-4">
        <label for="sobrenome" class="form-label">Sobrenome</label>
        <input type="text" id="sobrenome" name="sobrenome" class="form-control" placeholder="Pires Rodrigues" required>
      </div>

      <div class="col-md-4">
        <label for="usuario" class="form-label">Usuário</label>
        <div class="input-group">
          <span class="input-group-text">@</span>
          <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Kombeito_" required>
        </div>
      </div>

      <div class="col-md-6">
        <label for="cidade" class="form-label">Cidade</label>
        <input type="text" id="cidade" name="cidade" class="form-control" placeholder="Presidente Prudente" required>
      </div>

      <div class="col-md-3">
        <label for="estado" class="form-label">Estado</label>
        <input type="text" id="estado" name="estado" class="form-control" placeholder="São Paulo" required>
      </div>

      <div class="col-md-3">
        <label for="postal" class="form-label">Postal</label>
        <input type="text" id="postal" name="postal" class="form-control" placeholder="19031-610" required>
      </div>

    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" id="termosetc" name="termosetc" class="form-check-input">
      <label for="termosetc" class="form-check-label">Aceito os termos e condições</label>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Enviar</button>
    </div>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
