<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exercicio2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 100%; max-width: 900px;">
  <h3 class="mb-4 text-center">Cadastro de Clientes</h3>

  <form>

    <div class="row mb-3">
      <div class="col-md-1">
        <label class="form-label">Código</label>
        <input type="text" class="form-control" value="32" readonly style="background-color: #e0e0e0;">      </div>

      <div class="col-md-5">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control" placeholder="Alec Lindo" required="">
      </div>

      <div class="col-md-4">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="aleclindo@gmail.com" required="">
      </div>

    <div class="col-md-2">
        <label for="cpf" class="form-label">CPF</label>
        <input type="text" id="cpf" class="form-control" placeholder="90900990009" required="">
      </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-2">
            <label for="celular" class="form-label">Nº de celular</label>
            <input type="text" id="celular" class="form-control" placeholder="18900121224" required="">
        </div>

        <div class="col-md-2">
            <label for="telefone" class="form-label">Nº de telefone</label>
            <input type="text" id="telefone" class="form-control" placeholder="1832812676" required="=">
        </div>

      <div class="col-md-2">
        <label for="cep" class="form-label">CEP</label>
        <input type="text" id="cep" class="form-control" placeholder="ex:19031510" required="">
      </div>

      <div class="col-md-2">
        <label for="logradouro" class="form-label">Logradouro</label>
        <input type="text" id="Logradouro" class="form-control" placeholder="Rua 134," required="">
      </div>

      <div class="col-md-1">
        <label for="numerorua" class="form-label">Nº</label>
        <input type="text" id="numerorua" class="form-control" placeholder="Nº" required="">
      </div>

      <div class="col-md-3">
        <label for="bairro" class="form-label">Bairro</label>
        <input type="teste" id="bairro" class="form-control" placeholder="Bairro" required="">
      </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-3">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" id="cidade" class="form-control" placeholder="Flamengo" required="">
        </div>

        <div class="col-md-1">
            <label for="uf" class="form-label">UF</label>
            <input type="text" id="uf" class="form-control" placeholder="UF" required="">
          </div>
          <div class="col-md-2">
            <label for="status" class="form-label">Status</label>
            <select id="status" class="form-select">
              <option value="SP">SP</option>
              <option value="MG">MG</option>
              <option value="MT">MT</option>
              <option value="PA">PA</option>
              <option value="BH">BH</option>
              <option value="UPA">UPA</option>
              <option value="VODKA">VODKA</option>
            </select>
          </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="reset" class="btn btn-danger">Resetar</button>
      <button type="submit" class="btn btn-success">Enviar</button>
    </div>

  </form>
</div>

</body>
</html>
