<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exercicio3</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-start py-5">
    
<div class="card shadow p-4" style="width: 100%; max-width: 900px;">
  
  <h3 class="mb-4 text-center">Sample Form</h3>

  <form>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Partner Name</label>
        <input type="text" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Partner Email ID</label>
        <input type="text" class="form-control">
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Partner Legal Name</label>
        <input type="text" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Partner Mobile</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Partner Address</label>
      <textarea class="form-control" rows="2"></textarea>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Contract Start Date</label>
        <input type="date" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Contract Expiry Date</label>
        <input type="date" class="form-control">
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Minimum Loan Amount</label>
        <input type="number" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Maximum Loan Amount</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <label class="form-label">Interest Rate</label>
        <input type="text" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Deposit Amount</label>
        <input type="number" class="form-control">
      </div>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary px-4">Save</button>
    </div>

  </form>
</div>

</body>
</html>
