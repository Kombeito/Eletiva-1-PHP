<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Exercicio3</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 100%; max-width: 900px;">
  
    <h3 class="mb-4 text-center">Sample Form</h3>

  <form>

    <div class="row mb-3">

      <div class="col-md-5">
        <label for="nome" class="form-label">Partner Name</label>
        <input type="text" id="nome" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="email" class="form-label">Partner Email ID</label>
        <input type="text" id="email" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="nome2" class="form-label">Partner Legal Name</label>
        <input type="text" id="nome2" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="telefone" class="form-label">Partner Mobile</label>
        <input type="number" id="telefone" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-12">
        <label for="endereço" class="form-label">Partner Adress</label>
        <textarea id="text" name="endereço" class="form-control" rows="4" required="" style="height: 17px;"></textarea>
      </div>
      <div class="col-md-5">
        <label for="datainicio" class="form-label">Contract Start Date</label>
        <input type="date" id="datainicio" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="datafim" class="form-label">Contract Expiry Date</label>
        <input type="date" id="datafim" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="minimo-valor" class="form-label">Minimum Loan Amount</label>
        <input type="number" id="minimo-valor" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="maximo-valor" class="form-label">Maximum Loan Amount</label>
        <input type="number" id="maximo-valor" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="avaliacao" class="form-label">Interest Rate</label>
        <input type="text" id="avaliacao" class="form-control" placeholder="Alec Lindo" required="">
      </div>
      <div class="col-md-5">
        <label for="deposito" class="form-label">Deposit Amount</label>
        <input type="number" id="deposito" class="form-control" placeholder="Alec Lindo" required="">
      </div>



    <div class="d-flex justify-content-end gap-2">
      <button type="submit" class="btn btn-success">Save</button>
    </div>

  </form>
</div>

</body>
</html>
